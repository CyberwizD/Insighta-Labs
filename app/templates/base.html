<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Insighta Labs+{% endblock %}</title>
  <style>
    :root {
      --bg: #f4efe6;
      --surface: rgba(255, 252, 247, 0.94);
      --card: #fffaf2;
      --ink: #1f2a2f;
      --muted: #5d6a70;
      --line: rgba(31, 42, 47, 0.12);
      --accent: #b54b27;
      --accent-soft: #ffd9c4;
      --success: #2f7d4b;
      --shadow: 0 18px 55px rgba(42, 33, 24, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(181, 75, 39, 0.18), transparent 22rem),
        radial-gradient(circle at left center, rgba(47, 125, 75, 0.12), transparent 20rem),
        linear-gradient(180deg, #fbf6ef 0%, var(--bg) 100%);
      font-family: Georgia, "Times New Roman", serif;
    }
    a { color: inherit; text-decoration: none; }
    .shell { max-width: 1120px; margin: 0 auto; padding: 24px; }
    .nav {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 28px;
      padding: 18px 22px;
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: var(--shadow);
      border-radius: 24px;
      backdrop-filter: blur(16px);
    }
    .brand { font-size: 1.2rem; letter-spacing: 0.08em; text-transform: uppercase; }
    .nav-links { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
    .nav-link { padding: 10px 14px; border-radius: 999px; background: transparent; }
    .nav-link:hover { background: rgba(181, 75, 39, 0.08); }
    .page {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 32px;
      padding: 28px;
      box-shadow: var(--shadow);
    }
    .hero {
      display: grid;
      gap: 18px;
      margin-bottom: 28px;
    }
    .eyebrow {
      display: inline-flex;
      width: fit-content;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.75rem;
      font-weight: 700;
    }
    h1, h2, h3 { margin: 0; line-height: 1.05; }
    h1 { font-size: clamp(2.2rem, 5vw, 4rem); }
    h2 { font-size: 1.6rem; margin-bottom: 12px; }
    p { color: var(--muted); font-size: 1rem; line-height: 1.6; }
    .grid { display: grid; gap: 18px; }
    .grid.cards { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .card {
      padding: 18px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: var(--card);
    }
    .metric { font-size: 2.1rem; margin-top: 10px; }
    .button, button {
      appearance: none;
      border: 0;
      padding: 12px 18px;
      border-radius: 999px;
      background: var(--ink);
      color: white;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .button.alt {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line);
    }
    form.inline, .filters {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: end;
    }
    label { display: grid; gap: 6px; color: var(--muted); font-size: 0.9rem; }
    input, select {
      min-width: 180px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: white;
      font: inherit;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 18px;
      background: white;
      border-radius: 18px;
      overflow: hidden;
    }
    th, td {
      text-align: left;
      padding: 14px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 0.95rem;
    }
    th { color: var(--muted); font-weight: 600; }
    .stack { display: grid; gap: 18px; }
    .pill {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      border-radius: 999px;
      padding: 6px 12px;
      background: rgba(47, 125, 75, 0.12);
      color: var(--success);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    @media (max-width: 720px) {
      .shell { padding: 14px; }
      .nav, .page { padding: 18px; border-radius: 20px; }
      table, thead, tbody, tr, th, td { display: block; }
      th { display: none; }
      td { padding: 10px 0; }
      td::before {
        content: attr(data-label);
        display: block;
        font-size: 0.8rem;
        color: var(--muted);
        text-transform: uppercase;
        margin-bottom: 2px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <nav class="nav">
      <a class="brand" href="/web/dashboard">Insighta Labs+</a>
      <div class="nav-links">
        {% if user %}
          <a class="nav-link" href="/web/dashboard">Dashboard</a>
          <a class="nav-link" href="/web/profiles">Profiles</a>
          <a class="nav-link" href="/web/search">Search</a>
          <a class="nav-link" href="/web/account">Account</a>
        {% else %}
          <a class="nav-link" href="/web/login">Login</a>
        {% endif %}
      </div>
    </nav>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
